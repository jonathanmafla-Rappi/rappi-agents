# =========================================================
# EARLY CHURN — 3 secciones al final del informe
# Fuentes: EARLY_CHURN_SILVER + TG_EARLY_CHURN_CHANNEL
# Queries: early-churn-agente/references/track_early_churn/queries.sql
# =========================================================

  - id: early_churn_m1
    title: "Early Churn M1"
    is_churn_section: true
    anomaly_threshold_pp: 40
    note: "GAP invertido: positivo = sobre target (malo, rojo). QTD ponderado por TOTAL_STORE."
    rows:
      - label: "% Churn Hunting"
        source: early_churn_query
        field: churn_pct
        filter: {age: M1, canal: HUNTING}
        format: percent
        qtd_rule: weighted_ratio
      - label: "Target % Churn Hunting"
        source: early_churn_query
        field: target_pct
        filter: {age: M1, canal: HUNTING}
        format: percent
        qtd_rule: weighted_ratio
        invert_gap: true
        gap_against: "% Churn Hunting"
      - label: "% Churn Inside Sales"
        source: early_churn_query
        field: churn_pct
        filter: {age: M1, canal: IS}
        format: percent
        qtd_rule: weighted_ratio
      - label: "Target % Churn Inside Sales"
        source: early_churn_query
        field: target_pct
        filter: {age: M1, canal: IS}
        format: percent
        qtd_rule: weighted_ratio
        invert_gap: true
        gap_against: "% Churn Inside Sales"
      - label: "% Churn Self-Onboarding"
        source: early_churn_query
        field: churn_pct
        filter: {age: M1, canal: SOB}
        format: percent
        qtd_rule: weighted_ratio
      - label: "Target % Churn Self-Onboarding"
        source: early_churn_query
        field: target_pct
        filter: {age: M1, canal: SOB}
        format: percent
        qtd_rule: weighted_ratio
        invert_gap: true
        gap_against: "% Churn Self-Onboarding"
      - label: "% Churn Brand Expansion"
        source: early_churn_query
        field: churn_pct
        filter: {age: M1, canal: BE}
        format: percent
        qtd_rule: weighted_ratio
      - label: "Target % Churn Brand Expansion"
        source: early_churn_query
        field: target_pct
        filter: {age: M1, canal: BE}
        format: percent
        qtd_rule: weighted_ratio
        invert_gap: true
        gap_against: "% Churn Brand Expansion"
      - label: "% Churn Total"
        source: early_churn_query
        field: churn_pct
        filter: {age: M1, canal: TOTAL}
        format: percent
        qtd_rule: weighted_ratio
        is_churn_total: true
      - label: "Target % Churn Total"
        source: early_churn_query
        field: target_pct
        filter: {age: M1, canal: TOTAL}
        format: percent
        qtd_rule: weighted_ratio
        invert_gap: true
        gap_against: "% Churn Total"
        is_churn_total: true

