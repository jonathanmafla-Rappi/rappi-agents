report_id: nuevo_framing_q2
title: "Nuevo Framing Q2"
quarter_param: ":quarter"
default_quarter: "Q2"
last_updated: "2026-05-06"

axis:
  week_source_query: week_axis
  label_column: "KPI"
  qtd_column: "QTD"
  gap_column: "GAP"

display:
  empty_value: null
  missing_source_label: "N/A"
  pending_definition_label: "Pending definition"
  formats:
    integer: "#,##0"
    number: "#,##0.00"
    percent: "0.00%"

# NOTAS CLAVE DE TIPOS EN ELC_FUNNEL_GOLD:
#   TYPE = 'TOTAL AVAILABLE' → stock acumulado total (para Total Available Stores)
#   TYPE = 'TOTAL ACTIVE'    → stock acumulado total (para Total Active Stores)
#   TYPE = 'AVAILABLE'       → New Available (flujo semanal por canal)
#   TYPE = 'ACTIVE'          → New Active    (flujo semanal por canal)
#   TYPE = 'PERFECT STORE'   → conteo de perfect stores (con espacio, no guion bajo)
#   TYPE = 'HANDOFF_3/7/28'  → handoffs en N días
#   TYPE = 'LOG_7/28'        → first logins en N días
#   TYPE = 'ORDER_28'        → first orders en 28 días
#   TYPE = 'AVG_DIAS_HANDOFF/LOG/ORDER' → promedios de días (usar AVG, no SUM)

business_rules:
  q_filter: "Always filter by Q explicitly"
  target_cut_rule: "For QTD target comparison, use only weeks with actual available"
  null_future_weeks_rule: "Future weeks without actual remain null"
  old_rule: "Senior"
  productivity_real_rule: "SUM(STORES_TOTALES) / SUM(DIAS_TRABAJADOS)"
  hc_real_rule: "COUNT(DISTINCT HUNTER_EMAIL) WHERE HC = 1"
  target_hc_old_rule: "HC target senior / HC target total"
  target_macro_rule: "Do not average productivity targets at macro level. Recalculate target stores from productividad_target * dias_trabajados_reales and then derive target productivity as target_stores_macro / dias_trabajados_reales_total"
  target_join_rule: "Always aggregate ELC targets before joining to actuals. Include full target granularity to avoid duplication"
  total_vs_new_rule: "Total Available/Active usa TYPE='TOTAL AVAILABLE'/'TOTAL ACTIVE'. New Available/Active usa TYPE='AVAILABLE'/'ACTIVE'. Son distintos: stock puntual vs flujo semanal."
  total_stock_qtd_rule: "Total Available Stores y Total Active Stores son métricas de STOCK PUNTUAL (snapshot al cierre de semana), NO flujos acumulativos. Su QTD = valor de la última semana con actual cargado (no suma de semanas). Ejemplo: si el último actual es abr 27 con valor 154.424, el QTD = 154.424."
  net_adds_rule: "Net Available Adds = TOTAL AVAILABLE(t) - TOTAL AVAILABLE(t-1) via LAG. Net Active Adds = TOTAL ACTIVE(t) - TOTAL ACTIVE(t-1) via LAG. QTD de Net Adds = TOTAL(última semana con actual) - TOTAL(primera semana del quarter)."
  funnel_ratio_rule: "Las métricas de % funnel (perfect stores, handoff, login, order) = SUM(TYPE=X) / SUM(TYPE='CREATED'). Usar CREATED como denominador, no AVAILABLE."
  avg_dias_rule: "Los AVG_DIAS_* se agregan con AVG(CASE WHEN TYPE='AVG_DIAS_X' THEN METRIC END), no SUM. QTD = AVG simple sobre las semanas con dato."

qtd_rules:
  additive: "SUM(non_null_week_values)"
  avg: "AVG(non_null_week_values)"
  weighted_ratio: "SUM(numerator_parts) / NULLIF(SUM(denominator_parts),0)"
  weighted_productivity: "SUM(stores_parts) / NULLIF(SUM(days_parts),0)"
  funnel_ratio_qtd: "SUM(metric_type across all weeks) / SUM(CREATED across all weeks)"
  last_value: "Valor de la última semana con actual cargado. Aplica a métricas de stock puntual: Total Available Stores, Total Active Stores."

gap_rule: "QTD actual - QTD target"

sections:

  - id: main_metrics_top
    title: "Main Metrics"
    range: "D18:U24"
    rows:
      - label: "% Lead Penetration"
        source: none
        render_as: missing_source
        format: percent

      - label: "Total Available Stores"
        source: main_metrics_top_query
        field: total_available_stores
        note: "TYPE = TOTAL AVAILABLE. Stock puntual al cierre de semana. QTD = valor de la última semana con actual (no suma)."
        format: integer
        qtd_rule: last_value

      - label: "Net Available Adds"
        source: main_metrics_top_query
        field: net_available_adds
        note: "TOTAL AVAILABLE(t) - TOTAL AVAILABLE(t-1) via LAG"
        format: integer
        qtd_rule: additive

      - label: "Total Active Stores"
        source: main_metrics_top_query
        field: total_active_stores
        note: "TYPE = TOTAL ACTIVE. Stock puntual al cierre de semana. QTD = valor de la última semana con actual (no suma)."
        format: integer
        qtd_rule: last_value

      - label: "% Activation Rate"
        source: main_metrics_top_query
        field: activation_rate_pct
        note: "new_active / new_available (flujo)"
        format: percent
        qtd_rule: weighted_ratio

      - label: "Net Active Adds"
        source: main_metrics_top_query
        field: net_active_adds
        note: "TOTAL ACTIVE(t) - TOTAL ACTIVE(t-1) via LAG"
        format: integer
        qtd_rule: additive

